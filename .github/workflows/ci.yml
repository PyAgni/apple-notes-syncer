name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Run go vet
        run: go vet ./...
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Run staticcheck
        run: staticcheck ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Run tests with coverage
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic -count=1
      - name: Check coverage threshold
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${coverage}%"
          threshold=80
          if [ $(echo "${coverage} < ${threshold}" | bc -l) -eq 1 ]; then
            echo "FAIL: Coverage ${coverage}% is below threshold ${threshold}%"
            exit 1
          else
            echo "OK: Coverage ${coverage}% meets threshold ${threshold}%"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build binary
        run: go build -v -o bin/apple-notes-sync ./cmd/apple-notes-sync/
